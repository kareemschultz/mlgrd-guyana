name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (live CF Pages mode)
        env:
          NEXT_PUBLIC_API_BASE: ""
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=mlgrd-guyana --commit-dirty=true

      - name: Set CF Pages secrets (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_SECRET_VAL: ${{ secrets.ADMIN_SECRET }}
          ADMIN_PASSWORD_VAL: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          echo "$ADMIN_SECRET_VAL" | npx wrangler pages secret put ADMIN_SECRET --project-name=mlgrd-guyana
          echo "$ADMIN_PASSWORD_VAL" | npx wrangler pages secret put ADMIN_PASSWORD --project-name=mlgrd-guyana
